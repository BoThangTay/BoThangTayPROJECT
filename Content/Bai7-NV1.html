<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Form xịn</title>

<style>
*{box-sizing:border-box}
body{
    font-family:Arial;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    margin:0;
}

/* card */
.container{
    max-width:420px;
    margin:40px auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 15px 30px rgba(0,0,0,0.3);
    animation:fade .5s;
}

h2,h3{text-align:center}

input,select,textarea{
    width:100%;
    padding:10px;
    margin:6px 0 12px;
    border-radius:8px;
    border:1px solid #ccc;
}

input:focus{border-color:#4facfe;outline:none}

.row{display:flex;gap:10px}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.submit-btn{background:#28a745;color:white}
.feedback-btn{background:#007bff;color:white}

/* password */
.password-box{position:relative}
.toggle{
    position:absolute;
    right:10px;
    top:35%;
    cursor:pointer;
}

/* strength bar */
.strength{
    height:6px;
    border-radius:5px;
    background:#ddd;
    margin-bottom:10px;
}
.strength-bar{
    height:100%;
    width:0%;
    border-radius:5px;
    transition:.3s;
}

/* toast */
.toast{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#333;
    color:white;
    padding:10px 20px;
    border-radius:8px;
    opacity:0;
    transition:.3s;
}
.toast.show{opacity:1}

/* thank page */
.thank{
    display:none;
    text-align:center;
    padding:100px;
}

/* anim */
@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1}
}
</style>
</head>

<body>

<div id="main" class="container">
<h2>Đăng ký</h2>

<form id="form">

<input id="name" placeholder="Họ tên">
<input id="email" placeholder="Email">

<div class="password-box">
<input type="password" id="password" placeholder="Mật khẩu">
<span class="toggle" onclick="togglePass()">👁</span>
</div>

<div class="strength"><div id="bar" class="strength-bar"></div></div>

<input type="password" id="confirm" placeholder="Nhập lại mật khẩu">

<button type="submit" class="submit-btn">Đăng ký</button>
</form>

<h3>Góp ý</h3>
<textarea id="fb"></textarea>
<button class="feedback-btn" type="button" onclick="sendFB()">Gửi góp ý</button>

</div>

<div id="thank" class="thank">
<h1>Cảm ơn bạn!</h1>
<button onclick="back()">Quay lại</button>
</div>

<div id="toast" class="toast"></div>

<script>
// toast
function show(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),2000);
}

// toggle
function togglePass(){
let p=document.getElementById("password");
let icon=document.querySelector(".toggle");

if(p.type==="password"){
    p.type="text";
    icon.innerText="🙈";
}else{
    p.type="password";
    icon.innerText="👁";
}
}

// strength
document.getElementById("password").addEventListener("input",function(){
let v=this.value;
let bar=document.getElementById("bar");

let score=0;
if(v.length>5) score++;
if(/[A-Z]/.test(v)) score++;
if(/[0-9]/.test(v)) score++;
if(/[^A-Za-z0-9]/.test(v)) score++;

let width=["0%","25%","50%","75%","100%"];
let color=["","#ff4d4d","#ffa500","#4facfe","#28a745"];

bar.style.width=width[score];
bar.style.background=color[score];
});

// form
document.getElementById("form").addEventListener("submit",e=>{
e.preventDefault();

let name=document.getElementById("name").value.trim();
let email=document.getElementById("email").value.trim();
let p=document.getElementById("password").value;
let c=document.getElementById("confirm").value;

if(!name||!email||!p||!c){
    show("Điền đủ thông tin!");
    return;
}

if(!email.includes("@")){
    show("Email sai!");
    return;
}

if(p.length<6){
    show("Mật khẩu yếu!");
    return;
}

if(p!==c){
    show("Mật khẩu không khớp!");
    return;
}

show("Đăng ký thành công!");
document.getElementById("form").reset();
document.getElementById("bar").style.width="0%";
});

// feedback
function sendFB(){
let fb=document.getElementById("fb").value.trim();

if(!fb){
    show("Nhập góp ý!");
}else{
    document.getElementById("main").style.display="none";
    document.getElementById("thank").style.display="block";
}
}

// back
function back(){
document.getElementById("thank").style.display="none";
document.getElementById("main").style.display="block";
}
</script>

</body>
</html>
