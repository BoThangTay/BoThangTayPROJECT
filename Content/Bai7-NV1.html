<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Biểu mẫu đăng ký</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        .gender {
            display: flex;
            justify-content: space-around;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Biểu mẫu đăng ký</h2>

    <form action="#" method="post">

        <!-- Nhiệm vụ 1 -->
        <label>Họ và tên:</label>
        <input type="text" name="name" placeholder="Nhập họ tên">

        <label>Email:</label>
        <input type="email" name="email" placeholder="Nhập email">

        <!-- Nhiệm vụ 2 -->
        <label>Giới tính:</label>
        <div class="gender">
            <label><input type="radio" name="gender"> Nam</label>
            <label><input type="radio" name="gender"> Nữ</label>
        </div>

        <label>Sở thích:</label>
        <label><input type="checkbox"> Thể thao</label>
        <label><input type="checkbox"> Âm nhạc</label>
        <label><input type="checkbox"> Game</label>

        <!-- Nhiệm vụ 3 -->
        <label>Lớp:</label>
        <select>
            <option>12A1</option>
            <option>12A2</option>
            <option>12A3</option>
        </select>

        <label>Ghi chú:</label>
        <textarea rows="3"></textarea>

        <button type="submit">Gửi</button>

    </form>
</div>

</body>
</html>
