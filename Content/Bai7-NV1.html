<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng ký & Góp ý</title>

<style>
    body {
        font-family: Arial;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        margin: 0;
        padding: 0;
    }

    .container {
        max-width: 450px;
        margin: 40px auto;
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    h2 {
        text-align: center;
    }

    label {
        font-weight: bold;
    }

    input, select, textarea {
        width: 100%;
        padding: 8px;
        margin: 6px 0 12px;
        border-radius: 6px;
        border: 1px solid #ccc;
    }

    .row {
        display: flex;
        gap: 10px;
    }

    button {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
        margin-top: 5px;
    }

    .submit-btn {
        background: #28a745;
        color: white;
    }

    .feedback-btn {
        background: #007bff;
        color: white;
    }

    .message {
        text-align: center;
        margin-top: 15px;
        font-weight: bold;
        color: green;
    }

    .error {
        color: red;
        font-size: 13px;
    }

    /* KHUNG GÓP Ý */
    .feedback-box {
        margin-top: 20px;
        padding: 15px;
        border: 1px solid #ccc;
        border-radius: 10px;
        background: #f9f9f9;
    }
</style>
</head>

<body>

<div class="container">
    <h2>Đăng ký thông tin</h2>

    <form id="form">

        <label>Họ và tên:</label>
        <input type="text" id="name">
        <div class="error" id="nameError"></div>

        <label>Email:</label>
        <input type="text" id="email">
        <div class="error" id="emailError"></div>

        <label>Giới tính:</label>
        <div class="row">
            <label><input type="radio" name="gender"> Nam</label>
            <label><input type="radio" name="gender"> Nữ</label>
        </div>
        <div class="error" id="genderError"></div>

        <label>Sở thích:</label>
        <input type="text" id="hobby" placeholder="Nhập sở thích của bạn">

        <label>Lớp:</label>
        <select id="class">
            <option value="">-- Chọn lớp --</option>
            <option>12A1</option><option>12A2</option><option>12A3</option>
            <option>12A4</option><option>12A5</option><option>12A6</option>
            <option>12A7</option><option>12A8</option><option>12A9</option>
            <option>12A10</option><option>12A11</option><option>12A12</option>
            <option>12A13</option><option>12A14</option><option>12A15</option>
        </select>
        <div class="error" id="classError"></div>

        <button type="submit" class="submit-btn">Đăng ký</button>

        <div class="message" id="message"></div>

    </form>

    <!-- KHUNG GÓP Ý MỚI -->
    <div class="feedback-box">
        <h3>Góp ý</h3>

        <textarea id="feedback" rows="3" placeholder="Nhập góp ý của bạn"></textarea>

        <button class="feedback-btn" onclick="sendFeedback()">Gửi góp ý</button>

        <div class="message" id="feedbackMessage"></div>
    </div>

</div>

<script>
// XỬ LÝ ĐĂNG KÝ
document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    let valid = true;

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let gender = document.querySelector('input[name="gender"]:checked');
    let lop = document.getElementById("class").value;

    document.getElementById("nameError").innerText = "";
    document.getElementById("emailError").innerText = "";
    document.getElementById("genderError").innerText = "";
    document.getElementById("classError").innerText = "";
    document.getElementById("message").innerText = "";

    if(name === ""){
        document.getElementById("nameError").innerText = "Nhập tên!";
        valid = false;
    }

    if(!email.includes("@")){
        document.getElementById("emailError").innerText = "Email sai!";
        valid = false;
    }

    if(!gender){
        document.getElementById("genderError").innerText = "Chọn giới tính!";
        valid = false;
    }

    if(lop === ""){
        document.getElementById("classError").innerText = "Chọn lớp!";
        valid = false;
    }

    if(valid){
        document.getElementById("message").innerText = "Đăng ký thành công!";
    }
});

// XỬ LÝ GÓP Ý (ĐÃ SỬA CHUẨN)
function sendFeedback(){
    let feedback = document.getElementById("feedback").value.trim();
    let msg = document.getElementById("feedbackMessage");

    if(feedback === ""){
        msg.style.color = "red";
        msg.innerText = "Bạn chưa nhập góp ý!";
    } else {
        msg.style.color = "green";
        msg.innerText = "Cảm ơn bạn đã góp ý";
        document.getElementById("feedback").value = "";
    }
}
</script>

</body>
</html>
