<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng ký & Góp ý</title>

<style>
    body {
        font-family: Arial;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        margin: 0;
    }

    .container {
        max-width: 450px;
        margin: 40px auto;
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    h2, h3 {
        text-align: center;
    }

    input, select, textarea {
        width: 100%;
        padding: 8px;
        margin: 6px 0 12px;
        border-radius: 6px;
        border: 1px solid #ccc;
    }

    .row {
        display: flex;
        gap: 10px;
    }

    button {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
        margin-top: 5px;
    }

    .submit-btn {
        background: #28a745;
        color: white;
    }

    .feedback-btn {
        background: #007bff;
        color: white;
    }

    .error {
        color: red;
        font-size: 13px;
    }

    .feedback-box {
        margin-top: 20px;
        padding: 15px;
        border-radius: 10px;
        background: #f9f9f9;
    }

    /* TRANG CẢM ƠN */
    .thankyou {
        display: none;
        text-align: center;
        padding: 100px 20px;
    }

    .thankyou h1 {
        font-size: 35px;
    }

    .back-btn {
        width: auto;
        padding: 10px 20px;
        background: #333;
        color: white;
    }
</style>
</head>

<body>

<!-- TRANG CHÍNH -->
<div id="mainPage" class="container">
    <h2>Đăng ký thông tin</h2>

    <form id="form">
        <label>Họ và tên:</label>
        <input type="text" id="name">
        <div class="error" id="nameError"></div>

        <label>Email:</label>
        <input type="text" id="email">
        <div class="error" id="emailError"></div>

        <label>Giới tính:</label>
        <div class="row">
            <label><input type="radio" name="gender"> Nam</label>
            <label><input type="radio" name="gender"> Nữ</label>
        </div>
        <div class="error" id="genderError"></div>

        <label>Lớp:</label>
        <select id="class">
            <option value="">-- Chọn lớp --</option>
            <option>12A1</option>
            <option>12A2</option>
            <option>12A3</option>
        </select>
        <div class="error" id="classError"></div>

        <button type="submit" class="submit-btn">Đăng ký</button>
    </form>

    <!-- GÓP Ý -->
    <div class="feedback-box">
        <h3>Góp ý</h3>
        <textarea id="feedback" rows="3" placeholder="Nhập góp ý..."></textarea>

        <!-- QUAN TRỌNG: type="button" -->
        <button type="button" class="feedback-btn" onclick="sendFeedback()">Gửi góp ý</button>
    </div>
</div>

<!-- TRANG CẢM ƠN -->
<div id="thankPage" class="thankyou">
    <h1>Cảm ơn bạn đã góp ý</h1>
    <p>Chúng tôi xin ghi nhận ý kiến của bạn</p>
    <button class="back-btn" onclick="goBack()">Quay lại</button>
</div>

<script>
// FORM
document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let gender = document.querySelector('input[name="gender"]:checked');
    let lop = document.getElementById("class").value;

    document.getElementById("nameError").innerText = "";
    document.getElementById("emailError").innerText = "";
    document.getElementById("genderError").innerText = "";
    document.getElementById("classError").innerText = "";

    let valid = true;

    if(name === ""){
        document.getElementById("nameError").innerText = "Nhập tên!";
        valid = false;
    }

    if(!email.includes("@")){
        document.getElementById("emailError").innerText = "Email sai!";
        valid = false;
    }

    if(!gender){
        document.getElementById("genderError").innerText = "Chọn giới tính!";
        valid = false;
    }

    if(lop === ""){
        document.getElementById("classError").innerText = "Chọn lớp!";
        valid = false;
    }

    if(valid){
        alert("Đăng ký thành công!");
    }
});

// GÓP Ý → CHUYỂN TRANG
function sendFeedback(){
    let feedback = document.getElementById("feedback").value.trim();

    if(feedback === ""){
        alert("Bạn chưa nhập góp ý!");
    } else {
        document.getElementById("mainPage").style.display = "none";
        document.getElementById("thankPage").style.display = "block";
    }
}

// QUAY LẠI
function goBack(){
    document.getElementById("thankPage").style.display = "none";
    document.getElementById("mainPage").style.display = "block";
}
</script>

</body>
</html>
