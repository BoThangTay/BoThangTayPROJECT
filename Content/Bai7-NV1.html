<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng ký & Góp ý</title>

<style>
    * {
        box-sizing: border-box;
    }

    body {
        font-family: Arial;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        margin: 0;
    }

    .container {
        max-width: 450px;
        margin: 40px auto;
        background: white;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        animation: fadeIn 0.5s ease;
    }

    h2, h3 {
        text-align: center;
    }

    label {
        font-weight: bold;
    }

    input, select, textarea {
        width: 100%;
        padding: 10px;
        margin: 6px 0 12px;
        border-radius: 8px;
        border: 1px solid #ccc;
        transition: 0.2s;
    }

    input:focus, textarea:focus, select:focus {
        border-color: #4facfe;
        outline: none;
    }

    .row {
        display: flex;
        gap: 10px;
    }

    button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        margin-top: 5px;
        transition: 0.3s;
    }

    .submit-btn {
        background: #28a745;
        color: white;
    }

    .submit-btn:hover {
        background: #218838;
    }

    .feedback-btn {
        background: #007bff;
        color: white;
    }

    .feedback-btn:hover {
        background: #0056b3;
    }

    .error {
        color: red;
        font-size: 13px;
    }

    .feedback-box {
        margin-top: 20px;
        padding: 15px;
        border-radius: 10px;
        background: #f4f8ff;
    }

    /* TRANG CẢM ƠN */
    .thankyou {
        display: none;
        text-align: center;
        padding: 100px 20px;
        color: #333;
        animation: fadeIn 0.5s ease;
    }

    .thankyou h1 {
        font-size: 35px;
    }

    .thankyou p {
        font-size: 18px;
        margin: 15px 0;
    }

    .back-btn {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        background: #333;
        color: white;
        cursor: pointer;
    }

    .back-btn:hover {
        background: black;
    }

    /* TOAST */
    .toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #333;
        color: white;
        padding: 12px 20px;
        border-radius: 8px;
        opacity: 0;
        transform: translateY(20px);
        transition: 0.4s;
    }

    .toast.show {
        opacity: 1;
        transform: translateY(0);
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(20px);}
        to {opacity: 1; transform: translateY(0);}
    }
</style>
</head>

<body>

<!-- FORM -->
<div id="mainPage" class="container">
    <h2>Đăng ký thông tin</h2>

    <form id="form">
        <label>Họ và tên:</label>
        <input type="text" id="name">
        <div class="error" id="nameError"></div>

        <label>Email:</label>
        <input type="text" id="email">
        <div class="error" id="emailError"></div>

        <label>Giới tính:</label>
        <div class="row">
            <label><input type="radio" name="gender"> Nam</label>
            <label><input type="radio" name="gender"> Nữ</label>
        </div>
        <div class="error" id="genderError"></div>

        <label>Lớp:</label>
        <select id="class">
            <option value="">-- Chọn lớp --</option>
            <option>12A1</option><option>12A2</option>
            <option>12A3</option><option>12A4</option>
        </select>
        <div class="error" id="classError"></div>

        <button type="submit" class="submit-btn">Đăng ký</button>
    </form>

    <div class="feedback-box">
        <h3>Góp ý</h3>
        <textarea id="feedback" rows="3" placeholder="Nhập góp ý..."></textarea>
        <button class="feedback-btn" onclick="sendFeedback()">Gửi góp ý</button>
    </div>
</div>

<!-- TRANG CẢM ƠN -->
<div id="thankPage" class="thankyou">
    <h1>Cảm ơn bạn đã góp ý</h1>
    <p>Chúng tôi xin ghi nhận ý kiến của bạn</p>
    <button class="back-btn" onclick="goBack()">Quay lại</button>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<script>
// TOAST
function showToast(msg){
    let t = document.getElementById("toast");
    t.innerText = msg;
    t.classList.add("show");

    setTimeout(() => {
        t.classList.remove("show");
    }, 2000);
}

// FORM
document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    let valid = true;

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let gender = document.querySelector('input[name="gender"]:checked');
    let lop = document.getElementById("class").value;

    document.getElementById("nameError").innerText = "";
    document.getElementById("emailError").innerText = "";
    document.getElementById("genderError").innerText = "";
    document.getElementById("classError").innerText = "";

    if(name === ""){
        document.getElementById("nameError").innerText = "Nhập tên!";
        valid = false;
    }

    if(!email.includes("@")){
        document.getElementById("emailError").innerText = "Email sai!";
        valid = false;
    }

    if(!gender){
        document.getElementById("genderError").innerText = "Chọn giới tính!";
        valid = false;
    }

    if(lop === ""){
        document.getElementById("classError").innerText = "Chọn lớp!";
        valid = false;
    }

    if(valid){
        showToast("Đăng ký thành công!");
    }
});

// GÓP Ý
function sendFeedback(){
    let feedback = document.getElementById("feedback").value.trim();

    if(feedback === ""){
        showToast("Bạn chưa nhập góp ý!");
    } else {
        document.getElementById("mainPage").style.display = "none";
        document.getElementById("thankPage").style.display = "block";
    }
}

// QUAY LẠI
function goBack(){
    document.getElementById("thankPage").style.display = "none";
    document.getElementById("mainPage").style.display = "block";
}
</script>

</body>
</html>
