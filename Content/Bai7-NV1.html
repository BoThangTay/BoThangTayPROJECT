<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng ký & Góp ý</title>

<style>
body{
    font-family:Arial;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    margin:0;
}

.container{
    max-width:450px;
    margin:40px auto;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h2,h3{text-align:center}

input,select,textarea{
    width:100%;
    padding:8px;
    margin:6px 0 12px;
    border-radius:6px;
    border:1px solid #ccc;
}

.row{display:flex;gap:10px}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.submit-btn{background:#28a745;color:white}
.feedback-btn{background:#007bff;color:white}

.error{color:red;font-size:13px}

.feedback-box{
    margin-top:20px;
    padding:15px;
    border-radius:10px;
    background:#f9f9f9;
}

/* password */
.pass-box{position:relative}
.eye{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
}

/* thank page */
.thankyou{
    display:none;
    text-align:center;
    padding:100px 20px;
}

.back-btn{
    width:auto;
    padding:10px 20px;
    background:#333;
    color:white;
}
</style>
</head>

<body>

<div id="mainPage" class="container">
<h2>Đăng ký thông tin</h2>

<form id="form">

<label>Họ và tên:</label>
<input type="text" id="name" required>
<div class="error" id="nameError"></div>

<label>Email:</label>
<input type="email" id="email" required>
<div class="error" id="emailError"></div>

<label>Mật khẩu:</label>
<div class="pass-box">
<input type="password" id="password" required>
<span class="eye" onclick="togglePass()">👁</span>
</div>
<div class="error" id="passwordError"></div>

<label>Giới tính:</label>
<div class="row">
<label><input type="radio" name="gender" value="Nam"> Nam</label>
<label><input type="radio" name="gender" value="Nữ"> Nữ</label>
</div>
<div class="error" id="genderError"></div>

<label>Lớp:</label>
<select id="class" required>
<option value="">-- Chọn lớp --</option>
<option>12A1</option>
<option>12A2</option>
<option>12A3</option>
</select>
<div class="error" id="classError"></div>

<button type="submit" class="submit-btn">Đăng ký</button>
</form>

<div class="feedback-box">
<h3>Góp ý</h3>
<textarea id="feedback" rows="3"></textarea>
<button type="button" class="feedback-btn" onclick="sendFeedback()">Gửi góp ý</button>
</div>

</div>

<!-- THANK PAGE -->
<div id="thankPage" class="thankyou">
<h1>Cảm ơn bạn đã góp ý</h1>
<p>Chúng tôi xin ghi nhận ý kiến của bạn</p>
<button class="back-btn" onclick="goBack()">Quay lại</button>
</div>

<script>
// hiện/ẩn password
function togglePass(){
    let p=document.getElementById("password");
    p.type = (p.type==="password") ? "text" : "password";
}

// validate form
document.getElementById("form").addEventListener("submit",function(e){
e.preventDefault();

let valid=true;

let name=document.getElementById("name").value.trim();
let email=document.getElementById("email").value.trim();
let password=document.getElementById("password").value;
let gender=document.querySelector('input[name="gender"]:checked');
let lop=document.getElementById("class").value;

document.getElementById("nameError").innerText="";
document.getElementById("emailError").innerText="";
document.getElementById("passwordError").innerText="";
document.getElementById("genderError").innerText="";
document.getElementById("classError").innerText="";

if(name===""){
    document.getElementById("nameError").innerText="Nhập tên!";
    valid=false;
}

if(!email.includes("@")){
    document.getElementById("emailError").innerText="Email sai!";
    valid=false;
}

if(password.length<6){
    document.getElementById("passwordError").innerText="Mật khẩu ≥ 6 ký tự!";
    valid=false;
}

if(!gender){
    document.getElementById("genderError").innerText="Chọn giới tính!";
    valid=false;
}

if(lop===""){
    document.getElementById("classError").innerText="Chọn lớp!";
    valid=false;
}

if(valid){
    alert("Đăng ký thành công!");
}
});

// góp ý
function sendFeedback(){
let fb=document.getElementById("feedback").value.trim();

if(fb===""){
    alert("Bạn chưa nhập góp ý!");
}else{
    document.getElementById("mainPage").style.display="none";
    document.getElementById("thankPage").style.display="block";
}
}

// quay lại
function goBack(){
document.getElementById("thankPage").style.display="none";
document.getElementById("mainPage").style.display="block";
}
</script>

</body>
</html>
