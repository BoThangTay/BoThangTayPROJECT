<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Biểu mẫu đăng ký</title>

<style>
    body {
        font-family: Arial;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: white;
        padding: 25px;
        border-radius: 12px;
        width: 380px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    h2 {
        text-align: center;
        margin-bottom: 15px;
    }

    label {
        font-weight: bold;
    }

    input, select, textarea {
        width: 100%;
        padding: 8px;
        margin: 6px 0 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
    }

    .row {
        display: flex;
        gap: 10px;
    }

    .error {
        color: red;
        font-size: 13px;
    }

    button {
        width: 100%;
        padding: 10px;
        background: #28a745;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        background: #218838;
    }
</style>
</head>

<body>

<div class="container">
    <h2>Biểu mẫu đăng ký</h2>

    <form id="myForm">

        <!-- Nhiệm vụ 1 -->
        <label>Họ và tên:</label>
        <input type="text" id="name">
        <div class="error" id="nameError"></div>

        <label>Email:</label>
        <input type="text" id="email">
        <div class="error" id="emailError"></div>

        <!-- Nhiệm vụ 2 -->
        <label>Giới tính:</label>
        <div class="row">
            <label><input type="radio" name="gender" value="Nam"> Nam</label>
            <label><input type="radio" name="gender" value="Nữ"> Nữ</label>
        </div>
        <div class="error" id="genderError"></div>

        <label>Sở thích:</label>
        <label><input type="checkbox"> Thể thao</label>
        <label><input type="checkbox"> Âm nhạc</label>
        <label><input type="checkbox"> Game</label>

        <!-- Nhiệm vụ 3 -->
        <label>Lớp:</label>
        <select id="class">
            <option value="">-- Chọn lớp --</option>
            <option>12A1</option>
            <option>12A2</option>
            <option>12A3</option>
            <option>12A4</option>
            <option>12A5</option>
            <option>12A6</option>
            <option>12A7</option>
            <option>12A8</option>
            <option>12A9</option>
            <option>12A10</option>
            <option>12A11</option>
            <option>12A12</option>
            <option>12A13</option>
            <option>12A14</option>
            <option>12A15</option>
        </select>
        <div class="error" id="classError"></div>

        <label>Ghi chú:</label>
        <textarea rows="3"></textarea>

        <button type="submit">Gửi</button>
    </form>
</div>

<script>
document.getElementById("myForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let valid = true;

    // Reset lỗi
    document.getElementById("nameError").innerText = "";
    document.getElementById("emailError").innerText = "";
    document.getElementById("genderError").innerText = "";
    document.getElementById("classError").innerText = "";

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let gender = document.querySelector('input[name="gender"]:checked');
    let lop = document.getElementById("class").value;

    // Check tên
    if (name === "") {
        document.getElementById("nameError").innerText = "Vui lòng nhập tên";
        valid = false;
    }

    // Check email
    if (!email.includes("@")) {
        document.getElementById("emailError").innerText = "Email không hợp lệ";
        valid = false;
    }

    // Check giới tính
    if (!gender) {
        document.getElementById("genderError").innerText = "Chọn giới tính";
        valid = false;
    }

    // Check lớp
    if (lop === "") {
        document.getElementById("classError").innerText = "Chọn lớp";
        valid = false;
    }

    if (valid) {
        alert("Gửi thành công!");
    }
});
</script>

</body>
</html>
