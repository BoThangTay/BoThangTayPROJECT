<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng ký hội thao</title>

<style>
body{
    font-family:Arial;
    background:#f0f2f5;
}

/* FORM */
.container{
    max-width:400px;
    margin:50px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    transition:0.4s;
}

h3{text-align:center}
input{ margin:5px 0; }

button{
    width:100%;
    padding:8px;
    margin-top:10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.submit{background:#28a745;color:white}
.reset{background:#dc3545;color:white}

/* SUCCESS PAGE */
.success{
    display:none;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.success.show{
    display:flex;
}

.success-box{
    background:white;
    padding:30px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    animation:fadeIn 0.4s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

.back{
    margin-top:20px;
    padding:10px 20px;
    border:none;
    border-radius:5px;
    background:#007bff;
    color:white;
    cursor:pointer;
}

.error{
    color:red;
    font-size:13px;
}
</style>
</head>

<body>

<!-- FORM -->
<div class="container" id="formPage">
<form id="myForm">

<h3>Tham gia hội thao</h3>

<p>Họ và tên:</p>
<input type="text" id="name" required>

<p>Email:</p>
<input type="email" id="email" required>
<div class="error" id="emailError"></div>

<p>Mật khẩu:</p>
<input type="password" id="password" required>
<div class="error" id="passError"></div>

<p>Nhập lại mật khẩu:</p>
<input type="password" id="repassword" required>
<div class="error" id="repassError"></div>

<p>Chọn lớp:</p>
<label><input type="radio" name="lop" required> Lớp 10</label><br>
<label><input type="radio" name="lop"> Lớp 11</label><br>
<label><input type="radio" name="lop"> Lớp 12</label>

<p>Tham dự môn:</p>
<label><input type="checkbox" name="mon"> Bóng bàn</label><br>
<label><input type="checkbox" name="mon"> Cầu lông</label><br>
<label><input type="checkbox" name="mon"> Cờ vua</label>
<div class="error" id="monError"></div>

<button type="submit" class="submit">Đăng ký</button>
<button type="reset" class="reset">Huỷ bỏ</button>

</form>
</div>

<!-- TRANG GIẢ -->
<div class="success" id="successPage">
    <div class="success-box">
        <h2>Đăng ký thành công!</h2>
        <p id="userName"></p>
        <button class="back" onclick="backForm()">Quay lại</button>
    </div>
</div>

<script>
const form = document.getElementById("myForm");
const formPage = document.getElementById("formPage");
const successPage = document.getElementById("successPage");
const userName = document.getElementById("userName");

form.addEventListener("submit", function(e){
    e.preventDefault();

    let valid = true;

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value.trim();
    const pass = document.getElementById("password").value;
    const repass = document.getElementById("repassword").value;
    const mon = document.querySelectorAll('input[name="mon"]:checked');

    document.getElementById("emailError").innerText="";
    document.getElementById("passError").innerText="";
    document.getElementById("repassError").innerText="";
    document.getElementById("monError").innerText="";

    // check email
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
        document.getElementById("emailError").innerText="Email không hợp lệ!";
        valid=false;
    }

    // mật khẩu
    if(pass.length < 6){
        document.getElementById("passError").innerText="Mật khẩu ≥ 6 ký tự!";
        valid=false;
    }

    // nhập lại mật khẩu
    if(pass !== repass){
        document.getElementById("repassError").innerText="Mật khẩu không khớp!";
        valid=false;
    }

    // chọn ít nhất 1 môn
    if(mon.length === 0){
        document.getElementById("monError").innerText="Chọn ít nhất 1 môn!";
        valid=false;
    }

    if(!valid) return;

    // Hiển thị tên
    userName.innerText = "Chào " + name + " 👋";

    formPage.style.display = "none";
    successPage.classList.add("show");
});

function backForm(){
    successPage.classList.remove("show");
    formPage.style.display = "block";
    form.reset();
}
</script>

</body>
</html>
